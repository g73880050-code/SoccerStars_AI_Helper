workflows:
  android-debug:
    name: Build Android APK with p4a
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip
          pip install --upgrade pip
          pip install python-for-android
      - name: Build APK directly with p4a
        script: |
          # هنا نقوم بتحديد إعدادات المشروع يدوياً بعيداً عن Buildozer
          p4a apk --private . \
            --package=com.soccerstars.analyzer \
            --name="Soccer Stars Analyzer" \
            --version=1.1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,numpy,opencv,pyjnius \
            --arch=arm64-v8a \
            --sdk-dir=$HOME/android-sdk \
            --android-api=33 \
            --dist_name=soccerstars
    artifacts:
      - "*.apk"
