workflows:
  android-debug:
    name: Build Android APK with p4a
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Prerequisites
        script: |
          brew install autoconf libtool pkg-config automake
      - name: Prepare Final Build Environment
        script: |
          # 1. إنشاء البيئة وتثبيت كل شيء مسبقاً
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          # تثبيت المحرك والمتطلبات بشكل صريح هنا
          pip install python-for-android cython numpy
          
          # 2. تحديد متغيرات البيئة لضمان رؤية الموديولات
          export PATH=$PATH:$(pwd)/venv/bin
          export PYTHONPATH=$(pwd)/venv/lib/python3.12/site-packages
          
          # 3. بناء الـ APK باستخدام --no-toolchain-install
          # هذه العلامة تمنع p4a من محاولة إنشاء بيئة معزولة وتجعله يستخدم التي أنشأناها
          p4a apk --private . \
            --package=com.soccerstars.analyzer \
            --name="Soccer Stars Analyzer" \
            --version=1.1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,numpy,opencv,pyjnius,cython \
            --arch=arm64-v8a \
            --sdk-dir=$ANDROID_SDK_ROOT \
            --android-api=33 \
            --no-prerequisites \
            --no-toolchain-install \
            --dist_name=soccerstars
    artifacts:
      - "*.apk"
