workflows:
  android-debug:
    name: Build Android APK
    instance_type: mac_mini_m1
    scripts:
      - name: Setup Environment
        script: |
          # تثبيت الحزم الأساسية
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv openjdk-17-jdk
          
          # إنشاء بيئة افتراضية لتجنب تضارب المسارات
          python3 -m venv venv
          source venv/bin/activate
          
          # تثبيت الأدوات داخل البيئة الافتراضية
          pip install --upgrade pip
          pip install buildozer cython
          
          # التأكد من أن buildozer متاح للمسار
          export PATH=$PATH:$HOME/.local/bin
          
          # حفظ مسار الـ SDK
          export ANDROID_HOME=$HOME/android-sdk
          
          # تثبيت الأدوات يدوياً
          mkdir -p $ANDROID_HOME/cmdline-tools
          # ... (سنفترض أن SDK موجود أو سنقوم بتهيئة بناء تلقائي بسيط)
          
      - name: Build APK
        script: |
          # تفعيل البيئة في كل خطوة
          source venv/bin/activate
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$HOME/venv/bin
          
          # بناء التطبيق
          buildozer android debug
    artifacts:
      - bin/*.apk

