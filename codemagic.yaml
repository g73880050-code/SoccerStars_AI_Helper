workflows:
  android-debug:
    name: Build Android APK
    instance_type: mac_mini_m1
    environment:
      node: 18
    scripts:
      - name: Install Buildozer dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-11-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython
      - name: Accept Android SDK licenses
        script: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo -e "\nd56f5187473751e9f783267597378392120e7d58" >> "$ANDROID_HOME/licenses/android-sdk-license"
      - name: Build APK
        script: |
          buildozer android debug
    artifacts:
      - bin/*.apk
