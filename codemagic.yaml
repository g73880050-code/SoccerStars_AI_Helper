workflows:
  android-debug:
    name: Build Android APK
    instance_type: mac_mini_m1
    scripts:
      - name: System Diagnostics
        script: |
          echo "--- فحص المسارات ---"
          echo $PATH
          echo "--- فحص مكان وجود build-tools ---"
          ls -R /usr/local/lib/android/sdk/build-tools/ || echo "مجلد build-tools غير موجود في المسار المتوقع"
          echo "--- فحص نسخة SDK Manager ---"
          sdkmanager --version || echo "sdkmanager غير متاح"
      - name: Build APK (Force 33.0.0)
        script: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          # إجبار البناء على استخدام ما ثبتناه فقط
          buildozer -v android debug
    artifacts:
      - bin/*.apk
