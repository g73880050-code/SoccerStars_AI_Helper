workflows:
  android-debug:
    name: Build Android APK with p4a
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Prerequisites
        script: |
          brew install autoconf libtool pkg-config automake
      - name: Build APK directly with p4a
        script: |
          # 1. إعداد البيئة
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install python-for-android
          
          # 2. استخدام مسار الـ SDK الذي توفره Codemagic تلقائياً
          # المتغير ANDROID_SDK_ROOT هو المسار الرسمي والموجود في نظام Codemagic
          
          p4a apk --private . \
            --package=com.soccerstars.analyzer \
            --name="Soccer Stars Analyzer" \
            --version=1.1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,numpy,opencv,pyjnius \
            --arch=arm64-v8a \
            --sdk-dir=$ANDROID_SDK_ROOT \
            --android-api=33 \
            --no-prerequisites \
            --dist_name=soccerstars
    artifacts:
      - "*.apk"
